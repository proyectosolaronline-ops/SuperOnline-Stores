<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Directorio Easylink Web</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--primary:#1a73e8;--primary-dark:#0d47a1;--cta:#ff6900;--bg:#f5f6fa;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ═══ HEADER ═══ */
#header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:12px 16px 10px;display:flex;flex-direction:column;gap:10px;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .3s,padding .35s;flex-shrink:0;z-index:1100;overflow:hidden;max-height:80px;}
#header.promo-active{max-height:0;padding-top:0;padding-bottom:0;opacity:0;pointer-events:none;}
#header.hidden{transform:translateY(-100%);opacity:0;pointer-events:none;position:absolute;top:0;left:0;right:0;}
.header-top{display:flex;align-items:center;gap:12px;}
.header-logo{width:44px;height:44px;flex-shrink:0;background:rgba(255,255,255,.18);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.header-title{font-size:13px;font-weight:700;line-height:1.3;}
.header-sub{font-size:10px;opacity:.7;margin-top:1px;}

/* ═══ PROMO TICKER ═══ */
#promo-ticker{flex-shrink:0;overflow:hidden;height:0;transition:height .35s cubic-bezier(.4,0,.2,1);background:linear-gradient(135deg,var(--primary),var(--primary-dark));position:relative;z-index:1100;}
#promo-ticker.has-promos{height:70px;}
.pticker-track{display:flex;flex-direction:column;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.pticker-card{height:70px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 14px;cursor:pointer;position:relative;}
.pticker-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.07);}
.pticker-img{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.pticker-img-ph{width:50px;height:50px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--primary),#0d47a1);display:flex;align-items:center;justify-content:center;font-size:22px;}
.pticker-info{flex:1;overflow:hidden;}
.pticker-badge{font-size:9px;font-weight:700;color:var(--cta);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:flex;align-items:center;gap:4px;}
.pticker-badge-pill{background:rgba(255,105,0,.18);color:var(--cta);border-radius:20px;padding:1px 6px;font-size:8px;font-weight:800;}
.pticker-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pticker-store{font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pticker-arrow{font-size:16px;color:rgba(255,255,255,.35);}
.pticker-dots{position:absolute;top:50%;right:42px;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px;}
.pticker-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .3s,transform .3s;}
.pticker-dot.active{background:#fff;transform:scale(1.3);}

/* ═══ SEARCH ═══ */
.search-wrap{padding:10px 16px 12px;background:linear-gradient(180deg,rgba(26,115,232,.08) 0%,transparent 100%);flex-shrink:0;z-index:1050;}
.search-inner{display:flex;align-items:center;gap:10px;background:#fff;border-radius:50px;padding:0 14px;box-shadow:0 4px 20px rgba(0,0,0,.25);height:46px;}
.search-inner svg{flex-shrink:0;opacity:.45;}
#searchInput{flex:1;border:none;outline:none;font-size:15px;color:#222;background:transparent;font-family:'Inter',sans-serif;}
#searchInput::placeholder{color:#aaa;}
#clearBtn{background:none;border:none;cursor:pointer;padding:4px;display:none;color:#999;font-size:20px;line-height:1;}

/* ═══ MAP ═══ */
#map{flex:1;z-index:1;}
body.fs-mode #header,body.fs-mode .search-wrap,body.fs-mode .btn-mostrar-bottom{display:none!important;}
body.fs-mode .fab-group{bottom:18px;right:12px;}

/* ═══ FABs ═══ */
.fab-group{position:absolute;bottom:28px;right:14px;display:flex;flex-direction:column;gap:10px;z-index:1200;}
.fab{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 18px rgba(0,0,0,.35);transition:transform .15s;-webkit-user-select:none;user-select:none;}
.fab:active{transform:scale(.92);}
.fab-fs{background:#fff;color:#333;}
.fab-qr{background:#fff;color:var(--primary);}
.fab-out{background:linear-gradient(135deg,#ff6900,#e85d00);color:#fff;box-shadow:0 5px 18px rgba(255,105,0,.45);}

/* ═══ BTN LIST ═══ */
.btn-mostrar-bottom{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:1200;background:var(--primary);color:#fff;border:none;padding:13px 26px;border-radius:50px;font-size:14px;font-weight:600;box-shadow:0 6px 22px rgba(26,115,232,.5);cursor:pointer;white-space:nowrap;}

/* ═══ SEARCH PANEL ═══ */
#searchPanel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1300;flex-direction:column;overflow:hidden;}
#searchPanel.active{display:flex;}
.sp-header{background:#fff;padding:14px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;}
.sp-search-inner{flex:1;display:flex;align-items:center;gap:8px;background:#f1f3f6;border-radius:50px;padding:0 14px;height:42px;}
.sp-search-inner input{flex:1;border:none;outline:none;font-size:15px;background:transparent;font-family:'Inter',sans-serif;}
.sp-close{background:#f1f3f6;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555;}
.sp-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sp-empty{text-align:center;padding:60px 20px;color:#999;font-size:15px;}
.sp-item{display:flex;gap:14px;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;cursor:pointer;align-items:center;}
.sp-item:active{background:#f0f4ff;}
.sp-logo{width:58px;height:58px;flex-shrink:0;border-radius:14px;overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:22px;}
.sp-logo img{width:100%;height:100%;object-fit:cover;}
.sp-info h3{font-size:15px;font-weight:600;color:#111;margin-bottom:2px;}
.sp-dist{font-size:12px;font-weight:600;color:#16a34a;}
.sp-desc{font-size:12px;color:#777;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sp-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#e8f5e9;color:#2e7d32;font-weight:600;margin-left:5px;}
.sp-ext-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#fff3e0;color:#e65100;font-weight:600;margin-left:5px;}

/* ═══ POPUP TIENDA ═══ */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:flex-end;justify-content:center;}
.popup-bg.open{display:flex;}
.popup{background:#fff;color:#222;border-radius:24px 24px 0 0;width:100%;max-height:88dvh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.4);animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.popup-drag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;display:block;}
.popup-banner{height:150px;background-size:cover;background-position:center;position:relative;margin:0 0 48px;}
.popup-close{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(0,0,0,.45);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.popup-logo{width:74px;height:74px;border-radius:16px;border:4px solid #fff;position:absolute;bottom:-37px;left:18px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.25);}
.popup-body{padding:0 18px 28px;}
.popup-name{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.popup-desc{line-height:1.6;color:#444;font-size:14px;margin-bottom:18px;}
.popup-btn{display:block;padding:14px;background:var(--primary);color:#fff;text-align:center;border-radius:14px;text-decoration:none;font-weight:600;font-size:15px;}

/* ═══ MASTER SHEET — tabs ═══ */
.master-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2100;align-items:flex-end;justify-content:center;}
.master-modal.open{display:flex;}
.master-sheet{background:#fff;color:#222;width:100%;border-radius:24px 24px 0 0;max-height:88dvh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .35s cubic-bezier(.4,0,.2,1);}
.master-drag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;display:block;flex-shrink:0;}

/* Tabs */
.master-tabs{display:flex;flex-shrink:0;border-bottom:2px solid #f0f0f0;background:#fff;}
.master-tab{flex:1;padding:13px 8px 11px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:#999;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:color .2s;}
.master-tab .tab-icon{font-size:18px;}
.master-tab.active{color:var(--primary);}
.master-tab.active::after{content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:2px;background:var(--primary);border-radius:2px;}
.master-tab.tab-out.active{color:#ff6900;}
.master-tab.tab-out.active::after{background:#ff6900;}

/* Panels */
.master-panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.master-panel.active{display:flex;}
.panel-header{padding:12px 20px;color:#fff;font-weight:700;display:flex;justify-content:space-between;align-items:center;font-size:15px;flex-shrink:0;}
.panel-header-easylink{background:var(--primary);}
.panel-header-out{background:linear-gradient(135deg,#ff6900,#e85d00);}
.panel-close{font-size:26px;cursor:pointer;line-height:1;background:none;border:none;color:#fff;}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── Easylink items ── */
.store-item{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;align-items:center;}
.store-item:active{background:#f0f4ff;}
.store-logo{width:60px;height:60px;border-radius:14px;overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.store-logo img{width:100%;height:100%;object-fit:cover;}
.no-stores{text-align:center;padding:50px 20px;color:#999;font-size:14px;}

/* ── Stores Out ── */
.out-filters{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #f0f0f0;scrollbar-width:none;}
.out-filters::-webkit-scrollbar{display:none;}
.out-filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;transition:all .15s;white-space:nowrap;}
.out-filter-btn.active{background:#ff6900;color:#fff;border-color:#ff6900;}
.out-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.out-skel{padding:14px;display:flex;flex-direction:column;gap:12px;}
.out-skel-card{height:100px;background:#f0f0f0;border-radius:16px;animation:skelpulse 1.4s ease-in-out infinite;}
@keyframes skelpulse{0%,100%{opacity:1}50%{opacity:.45}}
.out-empty{text-align:center;padding:50px 20px;color:#999;font-size:14px;}

/* card */
.out-card{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;align-items:center;background:#fff;}
.out-card:active{background:#fff7ed;}
.out-card-foto{width:60px;height:60px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#fff7ed,#ffedd5);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.out-card-foto img{width:100%;height:100%;object-fit:cover;}
.out-card-info{flex:1;min-width:0;}
.out-card-name{font-size:15px;font-weight:700;color:#111;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.out-ext-badge{font-size:9px;background:#fff7ed;color:#ff6900;border:1px solid #ffedd5;padding:1px 7px;border-radius:20px;font-weight:700;flex-shrink:0;}
.out-card-cliente{font-size:12px;color:#6b7280;margin-bottom:4px;}
.out-card-loc{font-size:12px;color:#16a34a;font-weight:600;}
.out-card-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;}
.status-activo{background:rgba(22,163,74,.1);color:#16a34a;}
.status-suspendido{background:rgba(220,38,38,.1);color:#dc2626;}
.out-card-arrow{font-size:18px;color:#d1d5db;flex-shrink:0;}

/* ═══ POPUP NEGOCIO EXTERNO ═══ */
#out-detail-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;align-items:flex-end;justify-content:center;}
#out-detail-bg.open{display:flex;}
#out-detail{background:#fff;color:#222;width:100%;border-radius:28px 28px 0 0;max-height:88dvh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.od-drag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;display:block;}
.od-banner{height:180px;position:relative;overflow:hidden;background:linear-gradient(135deg,#ff6900,#e85d00);}
.od-banner img{width:100%;height:100%;object-fit:cover;}
.od-banner-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;}
.od-close{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(0,0,0,.4);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.od-body{padding:20px 18px 32px;}
.od-name{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;color:#111;}
.od-cliente{font-size:13px;color:#6b7280;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.od-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.od-chip{display:flex;align-items:center;gap:6px;background:#f8f9fb;border-radius:10px;padding:7px 12px;font-size:13px;color:#444;}
.od-chip strong{color:#111;}
.od-status-row{margin-bottom:20px;}
.od-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;}
.od-actions{display:flex;flex-direction:column;gap:10px;}
.od-btn-primary{padding:15px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;width:100%;}
.od-btn-wa{padding:13px;background:#e8f5e9;color:#16a34a;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;width:100%;}
.od-btn-map{padding:13px;background:#fff7ed;color:#ff6900;border:1px solid #ffedd5;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}

/* ═══ CATALOG SHEET ═══ */
#catalog-sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2300;align-items:flex-end;justify-content:center;}
#catalog-sheet-bg.open{display:flex;}
#catalog-sheet{background:#fff;color:#222;width:100%;border-radius:24px 24px 0 0;max-height:88dvh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .35s cubic-bezier(.4,0,.2,1);}
.cs-drag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px;display:block;}
.cs-header{padding:8px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.cs-store-row{display:flex;align-items:center;gap:10px;}
.cs-store-logo{width:40px;height:40px;border-radius:10px;overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cs-store-logo img{width:100%;height:100%;object-fit:cover;}
.cs-store-name{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#111;}
.cs-store-dist{font-size:11px;color:#16a34a;font-weight:600;}
.cs-close{width:32px;height:32px;border-radius:50%;background:#f1f3f6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#555;}
.cs-body{flex:1;overflow-y:auto;padding:14px;}
.cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.cs-prod{border-radius:12px;overflow:hidden;background:#f8f9fb;border:1px solid #eee;cursor:pointer;display:flex;flex-direction:column;}
.cs-prod:active{transform:scale(.97);}
.cs-prod-img{width:100%;aspect-ratio:1/1;object-fit:cover;}
.cs-prod-img-ph{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,#e8f0fe,#dde8ff);display:flex;align-items:center;justify-content:center;font-size:28px;}
.cs-prod-body{padding:7px 8px 8px;flex:1;}
.cs-prod-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--cta);color:#fff;margin-bottom:4px;}
.cs-prod-name{font-size:11px;font-weight:700;color:#111;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cs-prod-price{font-size:12px;font-weight:700;color:var(--primary);margin-top:4px;}
.cs-footer{padding:14px 18px 18px;border-top:1px solid #f0f0f0;flex-shrink:0;}
.cs-visit-btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;text-align:center;border-radius:14px;text-decoration:none;font-weight:700;font-size:15px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;}
.cs-skel{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.cs-skel-card{border-radius:12px;background:#f0f0f0;height:140px;animation:skelpulse 1.4s ease-in-out infinite;}

/* ═══ PROD POPUP ═══ */
#prod-popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2400;align-items:center;justify-content:center;padding:20px;}
#prod-popup-bg.open{display:flex;}
#prod-popup{background:#fff;color:#222;border-radius:20px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.pp-img{width:100%;height:200px;object-fit:cover;display:block;}
.pp-img-ph{width:100%;height:200px;background:linear-gradient(135deg,#e8f0fe,#dde8ff);display:flex;align-items:center;justify-content:center;font-size:64px;}
.pp-body{padding:18px;}
.pp-badge{display:inline-block;background:var(--cta);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.pp-name{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
.pp-store{font-size:12px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.pp-store-logo{width:22px;height:22px;border-radius:5px;overflow:hidden;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.pp-store-logo img{width:100%;height:100%;object-fit:cover;}
.pp-desc{font-size:13px;color:#444;line-height:1.6;margin-bottom:16px;}
.pp-price{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:16px;}
.pp-actions{display:flex;gap:10px;}
.pp-btn-visit{flex:1;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
.pp-btn-more{padding:13px;background:#f1f3f6;color:#333;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.pp-close{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(0,0,0,.45);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ═══ QR ═══ */
.qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2200;align-items:center;justify-content:center;padding:20px;}
.qr-modal.open{display:flex;}

<script>
/* ═══════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════ */
const BACKEND    = 'https://script.google.com/macros/s/AKfycbwUhTHQkBhLIvF9KgP2bHpVeufIEaPCXZWo9-azz7mYrEEA79BPFCQxE68YQQxE5iw/exec';
const STORE_BASE = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html';
const RADIO_KM   = 20;
const MAX_PROMO_FETCH = 8;

/* ── Estado global ── */
let ALL_STORES   = [];   // mezcla Easylink + externos del storesDirectory
let map, userLat = null, userLng = null, nearbyStores = [];
let qrInstance = null, isFsMode = false;
let PROMOS_LIST = [], tickerIndex = 0, tickerTimer = null, currentPromoStoreId = null;
const catalogCache = {};

/* ── Estado Stores Out ── */
// Los externos llegan dentro de ALL_STORES con isExternal:true
// También los cargamos por separado para tener todos (no solo los cercanos)
let ALL_EXTERNAL = [];   // todos los externos, sin filtro de distancia
let outFiltro    = 'todos';
let outMapMarkers = [];

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
function fixImgUrl(u){
  if(!u) return '';
  var m=u.match(/[?&]id=([\w-]+)/); if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];
  var m2=u.match(/\/d\/([\w-]+)/);  if(m2) return 'https://lh3.googleusercontent.com/d/'+m2[1];
  return u;
}
function haversineKm(la1,ln1,la2,ln2){
  var R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function buildStoreUrl(id){ return STORE_BASE+'?backend='+encodeURIComponent(BACKEND)+'&store='+encodeURIComponent(id); }

/* ═══════════════════════════════════════════
   CARGA INICIAL — storesDirectory devuelve
   Easylink + externos mezclados
   ═══════════════════════════════════════════ */
window.addEventListener('load', async () => {
  try {
    const r = await fetch(BACKEND+'?action=stores.directory');
    const d = await r.json();
    ALL_STORES = (d.stores||[]).map(s=>{
      s.config = typeof s.config==='string' ? JSON.parse(s.config) : (s.config||{});
      return s;
    });
    // Separar externos para Stores Out
    ALL_EXTERNAL = ALL_STORES.filter(s => s.isExternal === true);
  } catch(e){ console.warn('No se pudieron cargar tiendas:', e); }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{ userLat=pos.coords.latitude; userLng=pos.coords.longitude; initMap(); },
      ()  =>{ userLat=19.4326; userLng=-99.1332; initMap(); }
    );
  } else { userLat=19.4326; userLng=-99.1332; initMap(); }
});

/* ═══════════════════════════════════════════
   MAPA
   ═══════════════════════════════════════════ */
function fitToNearestStore(){
  if(!nearbyStores.length){ map.setView([userLat,userLng],14); return; }
  const sorted=[...nearbyStores].sort((a,b)=>{
    const ca=a.config||{},cb=b.config||{};
    return haversineKm(userLat,userLng,parseFloat(ca.locationLat||0),parseFloat(ca.locationLng||0))
          -haversineKm(userLat,userLng,parseFloat(cb.locationLat||0),parseFloat(cb.locationLng||0));
  });
  const nearest=sorted[0],nc=nearest.config||{};
  const nLat=parseFloat(nc.locationLat),nLng=parseFloat(nc.locationLng);
  const distKm=haversineKm(userLat,userLng,nLat,nLng);
  let maxZ=distKm<0.05?18:distKm<0.2?17:distKm<0.5?16:distKm<1?15:distKm<3?14:distKm<7?13:distKm<12?12:11;
  const bounds=L.latLngBounds([[userLat,userLng],[nLat,nLng]]);
  sorted.forEach(s=>{ const c=s.config||{};const la=parseFloat(c.locationLat),ln=parseFloat(c.locationLng);if(!isNaN(la)&&!isNaN(ln))bounds.extend([la,ln]); });
  map.fitBounds(bounds,{padding:[55,55],maxZoom:maxZ,animate:true});
}

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([userLat,userLng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.circleMarker([userLat,userLng],{radius:9,color:'#16a34a',fillColor:'#fff',weight:3,fillOpacity:1,zIndexOffset:1000})
    .addTo(map).bindTooltip('Tu ubicación',{permanent:false,direction:'top'});

  // Tiendas Easylink cercanas (sin externos)
  nearbyStores=ALL_STORES.filter(s=>{
    if(s.isExternal) return false;
    const cfg=s.config||{};
    const lat=parseFloat(cfg.locationLat),lng=parseFloat(cfg.locationLng);
    return !isNaN(lat)&&!isNaN(lng)&&haversineKm(userLat,userLng,lat,lng)<=RADIO_KM;
  });
  addEasylinkMarkers(nearbyStores);

  // Pines externos en mapa
  addOutMarkersToMap(ALL_EXTERNAL);

  map.whenReady(()=>setTimeout(fitToNearestStore,250));
  buildPromosFromCatalogs(nearbyStores);
}

/* Pines AZUL/círculo — Easylink */
function addEasylinkMarkers(stores){
  stores.forEach(s=>{
    const cfg=s.config||{};
    const lat=parseFloat(cfg.locationLat),lng=parseFloat(cfg.locationLng);
    if(isNaN(lat)||isNaN(lng)) return;
    const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const pinHTML=logoUrl
      ?`<img src="${logoUrl}" style="width:52px;height:52px;border-radius:50%;border:4px solid #fff;object-fit:cover;box-shadow:0 3px 10px rgba(0,0,0,.3);">`
      :`<div style="width:52px;height:52px;background:#1a73e8;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:4px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);">🏪</div>`;
    const icon=L.divIcon({html:pinHTML,className:'',iconSize:[56,56],iconAnchor:[28,28]});
    L.marker([lat,lng],{icon}).addTo(map).on('click',()=>openPopup(s.storeId));
  });
}

/* Pines NARANJA/rombo — Stores Out */
function addOutMarkersToMap(stores){
  removeOutMarkersFromMap();
  stores.forEach(s=>{
    const cfg=s.config||{};
    const lat=parseFloat(cfg.locationLat),lng=parseFloat(cfg.locationLng);
    if(isNaN(lat)||isNaN(lng)) return;
    const foto=fixImgUrl(cfg.logo||'');
    const pinHTML=foto
      ?`<div style="width:46px;height:46px;border-radius:8px;transform:rotate(45deg);border:3px solid #fff;overflow:hidden;box-shadow:0 3px 12px rgba(255,105,0,.5);"><img src="${foto}" style="width:100%;height:100%;object-fit:cover;transform:rotate(-45deg) scale(1.5);"></div>`
      :`<div style="width:46px;height:46px;background:linear-gradient(135deg,#ff6900,#e85d00);border:3px solid #fff;border-radius:8px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(255,105,0,.5);"><span style="transform:rotate(-45deg);font-size:18px;">🏢</span></div>`;
    const icon=L.divIcon({html:pinHTML,className:'',iconSize:[50,50],iconAnchor:[25,25]});
    const marker=L.marker([lat,lng],{icon,zIndexOffset:500}).addTo(map)
      .on('click',()=>openOutDetail(s));
    outMapMarkers.push(marker);
  });
}
function removeOutMarkersFromMap(){
  outMapMarkers.forEach(m=>{ try{ map.removeLayer(m); }catch(e){} });
  outMapMarkers=[];
}
function flyToOut(s){
  const cfg=s.config||{};
  const lat=parseFloat(cfg.locationLat),lng=parseFloat(cfg.locationLng);
  if(isNaN(lat)||isNaN(lng)) return;
  closeMasterModal(); closeOutDetail();
  map.setView([lat,lng],16,{animate:true});
  setTimeout(()=>openOutDetail(s),500);
}

/* ═══════════════════════════════════════════
   MASTER MODAL
   ═══════════════════════════════════════════ */
function showMasterModal(tab){
  document.getElementById('master-modal').classList.add('open');
  switchTab(tab);
}
function closeMasterModal(){
  document.getElementById('master-modal').classList.remove('open');
}
function switchTab(tab){
  ['easylink','out'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='easylink') renderEasylinkList();
  if(tab==='out')      renderOutList();
}

/* ═══════════════════════════════════════════
   PANEL EASYLINK
   ═══════════════════════════════════════════ */
function renderEasylinkList(){
  const list=document.getElementById('list-easylink');
  list.innerHTML='';
  if(!nearbyStores.length){
    list.innerHTML='<div class="no-stores">No hay tiendas Easylink en un radio de 20 km.</div>';
    return;
  }
  const sorted=[...nearbyStores].sort((a,b)=>{
    const ca=a.config||{},cb=b.config||{};
    return haversineKm(userLat,userLng,parseFloat(ca.locationLat||0),parseFloat(ca.locationLng||0))
          -haversineKm(userLat,userLng,parseFloat(cb.locationLat||0),parseFloat(cb.locationLng||0));
  });
  document.getElementById('panel-el-title').textContent=`Tiendas cercanas — ${sorted.length}`;
  document.getElementById('tab-el-label').textContent=`Easylink (${sorted.length})`;
  sorted.forEach(s=>{
    const cfg=s.config||{};
    const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const dist=haversineKm(userLat,userLng,parseFloat(cfg.locationLat||0),parseFloat(cfg.locationLng||0)).toFixed(1);
    const hasPromo=!!(cfg.promoTitle||cfg.promoImage);
    const item=document.createElement('div');
    item.className='store-item';
    item.innerHTML=`
      <div class="store-logo">${logoUrl?`<img src="${logoUrl}" alt="${s.name}">`:' 🏪'}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;">
          <strong style="font-size:15px;color:#111;">${s.name}</strong>
          ${hasPromo?'<span style="font-size:9px;background:#fff3e0;color:#e65100;padding:1px 6px;border-radius:20px;font-weight:700;">🔥 Promo</span>':''}
        </div>
        <p style="color:#16a34a;font-weight:600;font-size:13px;">📍 ${dist} km</p>
        <p style="font-size:12px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${cfg.description||'Tienda Easylink'}</p>
      </div>`;
    item.onclick=()=>{ closeMasterModal(); if(hasPromo) openCatalogSheet(s); else openPopup(s.storeId); };
    list.appendChild(item);
  });
}

/* ═══════════════════════════════════════════
   PANEL STORES OUT
   Usa los campos reales del backend:
   nombre_tienda → s.name
   nombre_cliente → cfg.nombreCliente
   telefono       → cfg.whatsapp
   foto           → cfg.logo
   localidad/colonia/estado → cfg.description (ya concatenado)
   link_negocio   → cfg.linkNegocio
   locationLat/Lng → cfg.locationLat/Lng
   ═══════════════════════════════════════════ */
function setOutFilter(f, btn){
  outFiltro=f;
  document.querySelectorAll('.out-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOutList();
}

function renderOutList(){
  const body=document.getElementById('list-out');

  let lista=ALL_EXTERNAL;
  if(outFiltro==='activo')     lista=lista.filter(s=>s.status==='active');
  if(outFiltro==='suspendido') lista=lista.filter(s=>s.status!=='active');

  document.getElementById('panel-out-title').textContent=`Stores Out — ${lista.length}`;
  document.getElementById('tab-out-label').textContent=`Stores Out (${ALL_EXTERNAL.length})`;

  if(!lista.length){
    body.innerHTML='<div class="out-empty">No hay negocios en este filtro.</div>';
    return;
  }

  body.innerHTML='';
  lista.forEach(s=>{
    const cfg=s.config||{};
    const foto=fixImgUrl(cfg.logo||'');
    const loc=cfg.description||cfg.storeLocation||'';   // ya viene "colonia, localidad, estado"
    const cliente=cfg.nombreCliente||'';
    const tel=cfg.whatsapp||'';
    const activo=s.status==='active';
    const tieneMapa=!isNaN(parseFloat(cfg.locationLat))&&!isNaN(parseFloat(cfg.locationLng));

    const card=document.createElement('div');

          ${s.name||'Sin nombre'}

function openOutDetail(s){
  const cfg=s.config||{};
  const foto=fixImgUrl(cfg.logo||'');
  const activo=s.status==='active';
  const tieneMapa=!isNaN(parseFloat(cfg.locationLat))&&!isNaN(parseFloat(cfg.locationLng));

  // Banner
  const banner=document.getElementById('od-banner');
  if(foto){
    banner.innerHTML=`<img src="${foto}" onerror="this.style.display='none'"><button class="od-close" onclick="closeOutDetail()">✕</button>`;
    banner.style.background='';
  } else {
    banner.innerHTML=`<div class="od-banner-ph">🏢</div><button class="od-close" onclick="closeOutDetail()">✕</button>`;
    banner.style.background='linear-gradient(135deg,#ff6900,#e85d00)';
  }

  document.getElementById('od-name').textContent=s.name||'Sin nombre';
  document.getElementById('od-cliente').innerHTML=`👤 <strong>${cfg.nombreCliente||'—'}</strong>`;

  // Status
  document.getElementById('od-status-row').innerHTML=`
    <div class="od-status ${activo?'status-activo':'status-suspendido'}">
      ${activo?'✅ Activo':'🚫 Suspendido'}
    </div>`;

  // Chips de info
  const chips=[];
  if(cfg.description) chips.push(`<div class="od-chip">📍 <span>${cfg.description}</span></div>`);
  if(cfg.whatsapp)    chips.push(`<div class="od-chip">📞 <span>${cfg.whatsapp}</span></div>`);
  if(tieneMapa&&userLat){
    const dist=haversineKm(userLat,userLng,parseFloat(cfg.locationLat),parseFloat(cfg.locationLng)).toFixed(1);
    chips.push(`<div class="od-chip">🗺️ <span>${dist} km de distancia</span></div>`);
  }
  document.getElementById('od-chips').innerHTML=chips.join('');

  // Acciones
  const ac=[];
  if(cfg.linkNegocio)
    ac.push(`<a href="${cfg.linkNegocio}" target="_blank" class="od-btn-primary">🌐 Visitar negocio</a>`);
  if(cfg.whatsapp)
    ac.push(`<a href="https://wa.me/${cfg.whatsapp.replace(/\D/g,'')}" target="_blank" class="od-btn-wa">💬 WhatsApp</a>`);
  if(tieneMapa&&activo)
    ac.push(`<button onclick="flyToOut(${JSON.stringify(s).replace(/'/g,"\\'")})" class="od-btn-map">📍 Ver en el mapa</button>`);
  document.getElementById('od-actions').innerHTML=ac.join('');

  document.getElementById('out-detail-bg').classList.add('open');
}
function closeOutDetail(){ document.getElementById('out-detail-bg').classList.remove('open'); }

/* ═══════════════════════════════════════════
   PROMOS / TICKER
   ═══════════════════════════════════════════ */
async function fetchStorePromos(storeId){
  if(catalogCache[storeId]) return catalogCache[storeId];
  try {
    const r=await fetch(BACKEND+'?action=stores.catalog&store='+encodeURIComponent(storeId));
    const d=await r.json();
    const all=d.products||d.items||(Array.isArray(d)?d:[]);
    const promos=all.filter(p=>(p.category||p.categoria||p.categoría||'').toLowerCase().includes('promo'));
    catalogCache[storeId]=promos; return promos;
  } catch(e){ catalogCache[storeId]=[]; return []; }
}
async function buildPromosFromCatalogs(stores){
  const sorted=[...stores].sort((a,b)=>{
    const ca=a.config||{},cb=b.config||{};
    return haversineKm(userLat,userLng,parseFloat(ca.locationLat||0),parseFloat(ca.locationLng||0))
          -haversineKm(userLat,userLng,parseFloat(cb.locationLat||0),parseFloat(cb.locationLng||0));
  }).slice(0,MAX_PROMO_FETCH);
  const results=await Promise.allSettled(sorted.map(s=>fetchStorePromos(s.storeId)));
  PROMOS_LIST=[];
  results.forEach((res,i)=>{
    const store=sorted[i],cfg=store.config||{};
    const logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const dist=userLat&&!isNaN(parseFloat(cfg.locationLat))?haversineKm(userLat,userLng,parseFloat(cfg.locationLat),parseFloat(cfg.locationLng)).toFixed(1)+' km':'';
    const promoProducts=(res.status==='fulfilled')?res.value:[];
    if(promoProducts.length>0){
      promoProducts.forEach(p=>PROMOS_LIST.push({storeId:store.storeId,storeName:store.name||'Tienda',storeLogo:logoUrl,storeUrl:buildStoreUrl(store.storeId),title:p.name||p.nombre||p.title||store.name,desc:p.description||p.descripcion||cfg.description||'',img:fixImgUrl(p.image||p.imagen||p.imageUrl||p.imgUrl||''),price:p.price||p.precio||'',dist}));
    } else if(cfg.promoTitle||cfg.promoImage){
      PROMOS_LIST.push({storeId:store.storeId,storeName:store.name||'Tienda',storeLogo:logoUrl,storeUrl:buildStoreUrl(store.storeId),title:cfg.promoTitle||store.name,desc:cfg.promoDesc||cfg.description||'',img:fixImgUrl(cfg.promoImage||''),price:'',dist});
    }
  });
  if(!PROMOS_LIST.length){ document.getElementById('promo-ticker').style.display='none'; return; }
  renderTicker(); startTickerAuto();
  document.getElementById('promo-ticker').classList.add('has-promos');
  document.getElementById('header').classList.add('promo-active');
}
function renderTicker(){
  const track=document.getElementById('pticker-track'),dotsEl=document.getElementById('pticker-dots');
  track.innerHTML=PROMOS_LIST.map((p,i)=>{
    const imgEl=p.img?`<img class="pticker-img" src="${p.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:' ';
    const phEl=`<div class="pticker-img-ph" ${p.img?'style="display:none"':''}>${p.storeLogo?`<img src="${p.storeLogo}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;" onerror="this.parentNode.textContent='🛍️'">`:' 🛍️'}</div>`;
    return `<div class="pticker-card" onclick="openPromoDetail(${i})">${imgEl}${phEl}<div class="pticker-info"><div class="pticker-badge">🔥 PROMO <span class="pticker-badge-pill">${p.dist||''}</span></div><div class="pticker-name">${p.title}</div><div class="pticker-store">🏪 ${p.storeName}</div></div><div class="pticker-arrow">›</div></div>`;
  }).join('');
  dotsEl.innerHTML=PROMOS_LIST.map((_,i)=>`<div class="pticker-dot${i===0?' active':''}" id="dot-${i}"></div>`).join('');
  moveTicker(0);
}
function moveTicker(idx){ tickerIndex=idx; const t=document.getElementById('pticker-track'); if(t) t.style.transform=`translateY(-${idx*70}px)`; document.querySelectorAll('.pticker-dot').forEach((d,i)=>d.classList.toggle('active',i===idx)); }
function startTickerAuto(){ stopTickerAuto(); if(PROMOS_LIST.length<2) return; tickerTimer=setInterval(()=>moveTicker((tickerIndex+1)%PROMOS_LIST.length),3500); }
function stopTickerAuto(){ if(tickerTimer){ clearInterval(tickerTimer); tickerTimer=null; } }
function openPromoDetail(idx){
  stopTickerAuto();
  const p=PROMOS_LIST[idx]; if(!p) return;
  currentPromoStoreId=p.storeId;
  document.getElementById('pp-img-wrap').innerHTML=p.img?`<img class="pp-img" src="${p.img}" onerror="this.parentNode.innerHTML='<div class=pp-img-ph>🛍️</div>'">`:' <div class="pp-img-ph">🛍️</div>';
  document.getElementById('pp-badge').textContent='🔥 Promoción';
  document.getElementById('pp-name').textContent=p.title;
  const logoHtml=p.storeLogo?`<div class="pp-store-logo"><img src="${p.storeLogo}" onerror="this.parentNode.textContent='🏪'"></div>`:`<div class="pp-store-logo">🏪</div>`;
  document.getElementById('pp-store').innerHTML=`${logoHtml}${p.storeName}${p.dist?' · '+p.dist:''}`;
  const pe=document.getElementById('pp-price');
  if(p.price){ pe.textContent='$'+p.price; pe.style.display=''; } else pe.style.display='none';
  document.getElementById('pp-desc').textContent=p.desc;
  document.getElementById('pp-btn-visit').onclick=()=>window.open(p.storeUrl,'_blank');
  document.getElementById('prod-popup-bg').classList.add('open');
}
function showMoreFromStore(){ closeProdPopup(); if(!currentPromoStoreId) return; const store=ALL_STORES.find(x=>x.storeId===currentPromoStoreId); if(store) openCatalogSheet(store); }
function closeProdPopup(){ document.getElementById('prod-popup-bg').classList.remove('open'); startTickerAuto(); }

/* ═══════════════════════════════════════════
   CATALOG SHEET

async function openCatalogSheet(store){
  const cfg=store.config||{},logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
  const dist=userLat&&!isNaN(parseFloat(cfg.locationLat))?haversineKm(userLat,userLng,parseFloat(cfg.locationLat),parseFloat(cfg.locationLng)).toFixed(1)+' km':'';
  document.getElementById('cs-store-logo').innerHTML=logoUrl?`<img src="${logoUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentNode.textContent='🏪'">`:' 🏪';
  document.getElementById('cs-store-name').textContent=store.name||'Tienda';
  document.getElementById('cs-store-dist').textContent=dist?'📍 '+dist:'';
  document.getElementById('cs-visit-btn').href=buildStoreUrl(store.storeId);
  const body=document.querySelector('.cs-body'); body.innerHTML='';
  const skel=document.createElement('div'); skel.className='cs-skel'; skel.style.gridColumn='1/-1'; skel.innerHTML=[1,2,3].map(()=>'<div class="cs-skel-card"></div>').join(''); body.appendChild(skel);
  document.getElementById('catalog-sheet-bg').classList.add('open');
  const promos=await fetchStorePromos(store.storeId);
  body.innerHTML=''; const grid=document.createElement('div'); grid.className='cs-grid'; grid.id='cs-grid'; body.appendChild(grid);
  if(promos.length>0){ promos.forEach(p=>grid.appendChild(buildCsProdCard({img:fixImgUrl(p.image||p.imagen||p.imageUrl||p.imgUrl||''),name:p.name||p.nombre||p.title||'Producto',desc:p.description||p.descripcion||'',price:p.price||p.precio||'',badge:'🔥 Promo',storeId:store.storeId}))); }
  else if(cfg.promoTitle||cfg.promoImage){ grid.appendChild(buildCsProdCard({img:fixImgUrl(cfg.promoImage||''),name:cfg.promoTitle||store.name,desc:cfg.promoDesc||cfg.description||'',price:'',badge:'🔥 Promo',storeId:store.storeId})); }
  const descCard=document.createElement('div'); descCard.className='cs-prod'; descCard.style.cursor='default'; descCard.innerHTML=`<div class="cs-prod-img-ph">🏪</div><div class="cs-prod-body"><div class="cs-prod-name" style="font-size:12px;-webkit-line-clamp:4;">${cfg.description||'Visita nuestra tienda.'}</div></div>`; grid.appendChild(descCard);
  const ctaCard=document.createElement('div'); ctaCard.className='cs-prod'; ctaCard.onclick=()=>window.open(buildStoreUrl(store.storeId),'_blank'); ctaCard.innerHTML=`<div class="cs-prod-img-ph" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));">🛒</div><div class="cs-prod-body"><div class="cs-prod-badge" style="background:var(--primary);">Ver más</div><div class="cs-prod-name">Catálogo completo</div></div>`; grid.appendChild(ctaCard);
}
function buildCsProdCard(prod){
  const card=document.createElement('div'); card.className='cs-prod'; card.onclick=()=>openCsProdDetail(prod);
  card.innerHTML=`${prod.img?`<img class="cs-prod-img" src="${prod.img}" onerror="this.parentNode.innerHTML='<div class=cs-prod-img-ph>🛍️</div>'">`:' <div class="cs-prod-img-ph">🛍️</div>'}<div class="cs-prod-body"><div class="cs-prod-badge">${prod.badge||'🔥 Promo'}</div><div class="cs-prod-name">${prod.name}</div>${prod.price?`<div class="cs-prod-price">$${prod.price}</div>`:''}</div>`;
  return card;
}
function openCsProdDetail(prod){
  currentPromoStoreId=prod.storeId;
  document.getElementById('pp-img-wrap').innerHTML=prod.img?`<img class="pp-img" src="${prod.img}" onerror="this.parentNode.innerHTML='<div class=pp-img-ph>🛍️</div>'">`:' <div class="pp-img-ph">🛍️</div>';
  document.getElementById('pp-badge').textContent=prod.badge||'🔥 Promo';
  document.getElementById('pp-name').textContent=prod.name||'';
  document.getElementById('pp-store').innerHTML='';
  const pe=document.getElementById('pp-price'); if(prod.price){ pe.textContent='$'+prod.price; pe.style.display=''; } else pe.style.display='none';
  document.getElementById('pp-desc').textContent=prod.desc||'';
  document.getElementById('pp-btn-visit').onclick=()=>window.open(buildStoreUrl(prod.storeId),'_blank');
  document.getElementById('prod-popup-bg').classList.add('open');
}
function closeCatalogSheet(){ document.getElementById('catalog-sheet-bg').classList.remove('open'); }

/* ═══════════════════════════════════════════
   BÚSQUEDA — incluye externos
   ═══════════════════════════════════════════ */
const searchInput=document.getElementById('searchInput');
const searchInput2=document.getElementById('searchInput2');
const clearBtn=document.getElementById('clearBtn');
function syncSearch(v){ searchInput.value=v; searchInput2.value=v; }
searchInput.addEventListener('input',e=>handleSearch(e.target.value));
searchInput2.addEventListener('input',e=>{ syncSearch(e.target.value); renderSearchResults(e.target.value); });
function handleSearch(val){ syncSearch(val); clearBtn.style.display=val?'block':'none'; if(val.trim()){ document.getElementById('header').classList.add('hidden'); document.getElementById('searchPanel').classList.add('active'); renderSearchResults(val); } else clearSearch(); }
function clearSearch(){ syncSearch(''); clearBtn.style.display='none'; document.getElementById('header').classList.remove('hidden'); document.getElementById('searchPanel').classList.remove('active'); }
function renderSearchResults(query){
  const q=query.trim().toLowerCase();
  function matchesQuery(s){
    const cfg=s.config||{};
    const texto=`${s.name||''} ${cfg.keywords||''} ${cfg.description||''} ${cfg.storeLocation||''} ${cfg.nombreCliente||''}`.toLowerCase();
    return texto.includes(q);
  }
  const results=ALL_STORES.filter(matchesQuery);
  const container=document.getElementById('searchResults');
  if(!results.length){ container.innerHTML=`<div class="sp-empty"><div style="font-size:36px;margin-bottom:12px;">🔍</div><div>Sin resultados para "<strong>${query}</strong>"</div></div>`; return; }
  container.innerHTML='';
  results.forEach(s=>{
    const cfg=s.config||{},logoUrl=fixImgUrl(cfg.logo||cfg.logoUrl||'');
    const lat=parseFloat(cfg.locationLat),lng=parseFloat(cfg.locationLng);
    const dist=userLat&&!isNaN(lat)?haversineKm(userLat,userLng,lat,lng).toFixed(1):null;
    const nearby=dist&&parseFloat(dist)<=RADIO_KM;
    const hasPromo=!!(cfg.promoTitle||cfg.promoImage);
    const isExt=s.isExternal===true;
    const item=document.createElement('div'); item.className='sp-item';
    item.innerHTML=`
      <div class="sp-logo">${logoUrl?`<img src="${logoUrl}" alt="${s.name}">`:isExt?' 🏢':' 🏪'}</div>
      <div class="sp-info">
        <h3>${s.name||'Tienda'}
          ${isExt?'<span class="sp-ext-badge">Externo</span>':''}
          ${hasPromo?'<span style="font-size:10px;background:#fff3e0;color:#e65100;padding:1px 7px;border-radius:20px;font-weight:700;">🔥 Promo</span>':''}
        </h3>
        ${dist?`<div class="sp-dist">📍 ${dist} km${nearby&&!isExt?'<span class="sp-badge">Cercana</span>':''}</div>`:''}
        <div class="sp-desc">${cfg.description||''}</div>
      </div>`;
    item.onclick=()=>{
      clearSearch();
      if(!isNaN(lat)&&!isNaN(lng)) map.setView([lat,lng],16,{animate:true});
      setTimeout(()=>{ if(isExt) openOutDetail(s); else if(hasPromo) openCatalogSheet(s); else openPopup(s.storeId); },350);
    };
    container.appendChild(item);
  });
}

/* ═══════════════════════════════════════════

function toggleFullscreen(){
  isFsMode=!isFsMode; document.body.classList.toggle('fs-mode',isFsMode);
  document.getElementById('fs-expand').style.display=isFsMode?'none':'block';
  document.getElementById('fs-compress').style.display=isFsMode?'block':'none';
  setTimeout(()=>{ map.invalidateSize(); if(isFsMode) fitToNearestStore(); },160);
  try{ if(isFsMode&&document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); else if(!isFsMode&&document.exitFullscreen) document.exitFullscreen(); }catch(e){}
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement&&isFsMode){
    isFsMode=false; document.body.classList.remove('fs-mode');
    document.getElementById('fs-expand').style.display='block';
    document.getElementById('fs-compress').style.display='none';
    setTimeout(()=>map.invalidateSize(),160);
  }
});
