<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tiendas Externas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .hidden { display: none; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        input { padding: 8px; margin: 10px 0; width: 300px; }
    </style>
</head>
<body>
    <h2>Directorio de Tiendas Externas</h2>
    
    <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filterStores()">
    <button onclick="loadStores()">Actualizar</button>
    <button onclick="toggleView()">Cambiar Vista</button>
    
    <div id="listView"></div>
    <div id="cardView" class="hidden"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9Uv91_9xOo1H0m9R2_TgIZa-g8wJQpETDqN12SltPkMA0Gy8/exec';
        
        let storesData = [];
        let isCardView = false;

        async function loadStores() {
            try {
                // Usar external.stores.list en lugar de stores.directory
                const response = await fetch(SCRIPT_URL + '?action=external.stores.list&token=admin123');
                const data = await response.json();
                storesData = data.stores || [];
                render();
            } catch(e) {
                document.getElementById('listView').innerHTML = '<p>Error: ' + e.message + '</p>';
            }
        }

        function render() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = storesData.filter(store => 
                (store.nombre_tienda || '').toLowerCase().includes(searchTerm) ||
                (store.nombre_cliente || '').toLowerCase().includes(searchTerm) ||
                (store.localidad || '').toLowerCase().includes(searchTerm)
            );
            
            if (isCardView) {
                renderCards(filtered);
            } else {
                renderTable(filtered);
            }
        }

        function renderTable(stores) {
            let html = '(\s*<table>\s*<thead>\s*<tr>';
            html += '<th>StoreId</th><th>Tienda</th><th>Cliente</th><th>Teléfono</th><th>Localidad</th><th>Colonia</th>';
            html += '<th>Estado</th><th>Lat</th><th>Lng</th><th>Link</th><th>Giro</th>';
            html += '<th>Ubicate</th><th>Llegar</th><th>WhatsApp</th><th>Móvil</th><th>Horario</th><th>Correo</th><th>Status</th>';
            html += '</tr></thead><tbody>';
            
            for (const s of stores) {
                html += '<tr>';
                html += `<td>${s.storeId || ''}</td>`;
                html += `<td>${s.nombre_tienda || ''}</td>`;
                html += `<td>${s.nombre_cliente || ''}</td>`;
                html += `<td>${s.telefono || ''}</td>`;
                html += `<td>${s.localidad || ''}</td>`;
                html += `<td>${s.colonia || ''}</td>`;
                html += `<td>${s.estado || ''}</td>`;
                html += `<td>${s.locationLat || ''}</td>`;
                html += `<td>${s.locationLng || ''}</td>`;
                html += `<td>${s.link_negocio ? '<a href="'+s.link_negocio+'" target="_blank">Link</a>' : ''}</td>`;
                html += `<td>${s.tipo_negocio || ''}</td>`;
                html += `<td>${s.ubicate || ''}</td>`;
                html += `<td>${s.llegar === true || s.llegar === 'TRUE' ? 'Sí' : 'No'}</td>`;
                html += `<td>${s.whatsapp === true || s.whatsapp === 'TRUE' ? 'Sí' : 'No'}</td>`;
                html += `<td>${s.movil === true || s.movil === 'TRUE' ? 'Sí' : 'No'}</td>`;
                html += `<td>${s.horariopromotor || ''}</td>`;
                html += `<td>${s.correo || ''}</td>`;
                html += `<td>${s.status || ''}</td>`;
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('listView').innerHTML = html;
        }

        function renderCards(stores) {
            let html = '';
            for (const s of stores) {
                html += '<div class="card">';
                html += `<strong>🏪 ${s.nombre_tienda || 'Sin nombre'}</strong><br>`;
                html += `🆔 StoreId: ${s.storeId || '-'}<br>`;
                html += `📋 Cliente: ${s.nombre_cliente || '-'}<br>`;
                html += `📞 Teléfono: ${s.telefono || '-'}<br>`;
                html += `📍 Ubicación: ${s.localidad || '-'}, ${s.colonia || '-'}, ${s.estado || '-'}<br>`;
                html += `🗺️ Lat/Lng: ${s.locationLat || '-'}, ${s.locationLng || '-'}<br>`;
                html += `🔗 Link: ${s.link_negocio ? '<a href="'+s.link_negocio+'" target="_blank">Ir</a>' : '-'}<br>`;
                html += `🏷️ Giro: ${s.tipo_negocio || '-'}<br>`;
                html += `📍 Ubicate: ${s.ubicate || '-'}<br>`;
                html += `🚗 Llegar: ${s.llegar === true || s.llegar === 'TRUE' ? 'Sí' : 'No'}<br>`;
                html += `💬 WhatsApp: ${s.whatsapp === true || s.whatsapp === 'TRUE' ? 'Sí' : 'No'}<br>`;
                html += `🛵 Móvil: ${s.movil === true || s.movil === 'TRUE' ? 'Sí' : 'No'}<br>`;
                html += `⏰ Horario: ${s.horariopromotor || '-'}<br>`;
                html += `✉️ Correo: ${s.correo || '-'}<br>`;
                html += `📊 Status: ${s.status || '-'}<br>`;
                if (s.foto && s.foto !== '') {
                    html += `<img src="${s.foto}" style="max-width:100px; margin-top:10px;" onerror="this.style.display='none'">`;
                }
                html += '</div>';
            }
            document.getElementById('cardView').innerHTML = html;
        }

        function filterStores() {
            render();
        }

        function toggleView() {
            isCardView = !isCardView;
            document.getElementById('listView').classList.toggle('hidden', isCardView);
            document.getElementById('cardView').classList.toggle('hidden', !isCardView);
            render();
        }

        loadStores();
    </script>
</body>
</html>
