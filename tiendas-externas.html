<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tiendas Externas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .hidden { display: none; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        input { padding: 8px; margin: 10px 0; width: 300px; }
    </style>
</head>
<body>
    <h2>Directorio de Tiendas Externas</h2>
    
    <input type="text" id="searchInput" placeholder="Buscar por nombre, cliente o localidad..." onkeyup="filterStores()">
    <button onclick="loadStores()">Actualizar</button>
    <button onclick="toggleView()">Cambiar Vista</button>
    
    <div id="listView"></div>
    <div id="cardView" class="hidden"></div>

    <script>
        // URL DE TU BACKEND - REEMPLAZAR CON LA URL CORRECTA
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
        
        let storesData = [];
        let isCardView = false;

        async function loadStores() {
            try {
                const response = await fetch(SCRIPT_URL + '?action=stores.directory');
                const data = await response.json();
                storesData = data.stores?.filter(s => s.isExternal === true) || [];
                render();
            } catch(e) {
                document.getElementById('listView').innerHTML = '<p>Error al cargar: ' + e.message + '</p>';
            }
        }

        function render() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = storesData.filter(store => 
                store.name?.toLowerCase().includes(searchTerm) ||
                store.config?.nombreCliente?.toLowerCase().includes(searchTerm) ||
                store.config?.localidad?.toLowerCase().includes(searchTerm)
            );
            
            if (isCardView) {
                renderCards(filtered);
            } else {
                renderTable(filtered);
            }
        }

        function renderTable(stores) {
            let html = '<table><thead><tr>';
            html += '<th>Tienda</th><th>Cliente</th><th>Teléfono</th><th>Localidad</th><th>Colonia</th>';
            html += '<th>Estado</th><th>Coordenadas</th><th>Link</th><th>Giro</th>';
            html += '<th>¿Llegar?</th><th>WhatsApp</th><th>Móvil</th><th>Horario</th><th>Ubicación</th><th>Correo</th>';
            html += '</tr></thead><tbody>';
            
            for (const store of stores) {
                const cfg = store.config || {};
                html += '<tr>';
                html += `<td>${store.name || ''}</td>`;
                html += `<td>${cfg.nombreCliente || ''}</td>`;
                html += `<td>${cfg.telefono || ''}</td>`;
                html += `<td>${cfg.localidad || ''}</td>`;
                html += `<td>${cfg.colonia || ''}</td>`;
                html += `<td>${cfg.estado || ''}</td>`;
                html += `<td>${cfg.locationLat || ''}, ${cfg.locationLng || ''}</td>`;
                html += `<td>${cfg.linkNegocio ? '<a href="'+cfg.linkNegocio+'" target="_blank">Ver</a>' : ''}</td>`;
                html += `<td>${cfg.tipoNegocio || ''}</td>`;
                html += `<td>${cfg.llegar ? 'Sí' : 'No'}</td>`;
                html += `<td>${cfg.whatsapp ? 'Sí' : 'No'}</td>`;
                html += `<td>${cfg.Movil ? 'Sí' : 'No'}</td>`;
                html += `<td>${cfg.horariopromotor || ''}</td>`;
                html += `<td>${cfg.ubicate || ''}</td>`;
                html += `<td>${cfg.correo || ''}</td>`;
                html += '</tr>';
            }
            html += '</tbody><table>';
            document.getElementById('listView').innerHTML = html;
        }

        function renderCards(stores) {
            let html = '';
            for (const store of stores) {
                const cfg = store.config || {};
                html += '<div class="card">';
                html += `<strong>🏪 ${store.name || 'Sin nombre'}</strong><br>`;
                html += `📋 Cliente: ${cfg.nombreCliente || '-'}<br>`;
                html += `📞 Teléfono: ${cfg.telefono || '-'}<br>`;
                html += `📍 Ubicación: ${cfg.localidad || '-'}, ${cfg.colonia || '-'}, ${cfg.estado || '-'}<br>`;
                html += `🗺️ Coordenadas: ${cfg.locationLat || '-'}, ${cfg.locationLng || '-'}<br>`;
                html += `🔗 Link: ${cfg.linkNegocio ? '<a href="'+cfg.linkNegocio+'" target="_blank">Ir</a>' : '-'}<br>`;
                html += `🏷️ Giro: ${cfg.tipoNegocio || '-'}<br>`;
                html += `🚗 ¿Llegar?: ${cfg.llegar ? 'Sí' : 'No'}<br>`;
                html += `💬 WhatsApp: ${cfg.whatsapp ? 'Sí' : 'No'}<br>`;
                html += `🛵 Servicio Móvil: ${cfg.Movil ? 'Sí' : 'No'}<br>`;
                html += `⏰ Horario: ${cfg.horariopromotor || '-'}<br>`;
                html += `📍 Ubicación texto: ${cfg.ubicate || '-'}<br>`;
                html += `✉️ Correo: ${cfg.correo || '-'}<br>`;
                if (cfg.logo && cfg.logo !== '') {
                    html += `<img src="${cfg.logo}" style="max-width:100px; margin-top:10px;" onerror="this.style.display='none'">`;
                }
                html += '</div>';
            }
            document.getElementById('cardView').innerHTML = html;
        }

        function filterStores() {
            render();
        }

        function toggleView() {
            isCardView = !isCardView;
            document.getElementById('listView').classList.toggle('hidden', isCardView);
            document.getElementById('cardView').classList.toggle('hidden', !isCardView);
            render();
        }

        loadStores();
    </script>
</body>
</html>
